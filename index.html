<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1024">
<title>N3 마스터 — 시험장 가기 전 모든 것</title>
<style>
:root{
  --bg1:#0f1024; --bg2:#1a1a3e; --bg3:#2d1b4e;
  --card:#ffffff; --ink:#0b1230;
  --accent:#ff5d8f; --accent2:#7a5cff; --accent3:#22d3ee;
  --ok:#22c55e; --ng:#ef4444; --warn:#fbbf24;
  --soft:#e8eaff; --muted:#6b7280;
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-bot:env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Noto Sans KR",sans-serif;
  background:linear-gradient(180deg,var(--bg1),var(--bg2) 50%,var(--bg3));
  background-attachment:fixed;color:#fff;min-height:100vh;min-height:100dvh;
  -webkit-user-select:none;user-select:none;touch-action:manipulation;
}
.app{padding:calc(var(--safe-top) + 14px) 14px calc(var(--safe-bot) + 24px);max-width:560px;margin:0 auto;}
.hide{display:none !important;}

/* 헤더 */
.appbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.brand{font-size:17px;font-weight:800;letter-spacing:-0.3px;}
.brand span{background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;background-clip:text;color:transparent;}
.appbar-btns{display:flex;gap:8px;}
.iconbtn{
  width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);color:#fff;font-size:17px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.iconbtn:active{transform:scale(0.94);background:rgba(255,255,255,0.18);}
.backbtn{padding:8px 14px;border-radius:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);color:#fff;font-size:13px;font-weight:700;cursor:pointer;}

/* === 랜딩 === */
.landing-hero{
  background:linear-gradient(135deg,rgba(255,93,143,0.18),rgba(122,92,255,0.18));
  border:1px solid rgba(255,255,255,0.12);
  border-radius:18px;padding:20px;margin-bottom:18px;
}
.landing-hero h1{font-size:22px;font-weight:800;line-height:1.3;margin-bottom:8px;}
.landing-hero p{font-size:13px;color:rgba(255,255,255,0.78);line-height:1.5;}
.landing-hero .meta-row{display:flex;gap:16px;margin-top:14px;}
.landing-hero .meta-item{flex:1;}
.landing-hero .meta-item b{display:block;font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent3),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;}
.landing-hero .meta-item small{font-size:11px;color:rgba(255,255,255,0.6);}

.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.menu-card{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.13);
  border-radius:16px;padding:16px;cursor:pointer;transition:.18s;
}
.menu-card:active{transform:scale(0.96);}
.menu-card.full{grid-column:1 / -1;}
.menu-card .ic{font-size:28px;margin-bottom:6px;}
.menu-card .ttl{font-size:14px;font-weight:800;margin-bottom:4px;}
.menu-card .sub{font-size:11px;color:rgba(255,255,255,0.65);line-height:1.4;}
.menu-card.hot{background:linear-gradient(135deg,rgba(255,93,143,0.25),rgba(251,191,36,0.2));border-color:rgba(255,93,143,0.4);}
.menu-card.hot .tag{display:inline-block;font-size:9px;background:var(--accent);padding:2px 7px;border-radius:99px;margin-top:6px;font-weight:800;}

/* 메뉴 카드 진행률 바 */
.menu-card .mc-prog{margin-top:10px;}
.menu-card .mc-prog-bar{height:4px;background:rgba(255,255,255,0.12);border-radius:2px;overflow:hidden;margin-bottom:4px;}
.menu-card .mc-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent));width:0%;transition:width .3s;}
.menu-card .mc-prog-text{font-size:10px;color:rgba(255,255,255,0.7);display:flex;justify-content:space-between;align-items:center;}
.menu-card .mc-prog-text .check{color:#86efac;font-weight:800;}
.menu-card.wrong-card{background:linear-gradient(135deg,rgba(239,68,68,0.22),rgba(251,146,60,0.18));border-color:rgba(239,68,68,0.35);}
.menu-card.wrong-card .mc-count{display:inline-block;font-size:10px;background:var(--ng);color:#fff;padding:2px 8px;border-radius:99px;margin-top:4px;font-weight:800;}
.menu-card.reset-card{background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.22);}

.landing-tip{
  background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.25);
  border-radius:12px;padding:12px 14px;font-size:12px;color:rgba(255,255,255,0.82);line-height:1.5;
}
.landing-tip b{color:var(--accent3);}

/* === 공통 === */
.section-title{font-size:14px;font-weight:800;color:rgba(255,255,255,0.85);margin:18px 0 10px;letter-spacing:-0.3px;}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;-webkit-overflow-scrolling:touch;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;padding:8px 14px;border-radius:99px;font-size:12px;font-weight:700;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);
  color:rgba(255,255,255,0.78);white-space:nowrap;cursor:pointer;
}
.chip.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;}
.chip .cnt{font-size:10px;opacity:0.75;margin-left:4px;}

.progress{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin-bottom:8px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));width:0%;transition:width 0.3s;}
.stats{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:12px;}
.stats b{color:#fff;}
.stats .ok{color:#86efac;}
.stats .ng{color:#fca5a5;}

/* === 단어 카드 (3D Flip) === */
.flip-wrap{
  perspective:1400px;
  margin-bottom:14px;
  min-height:280px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.flip-inner{
  position:relative;
  width:100%;
  min-height:280px;
  transition:transform .55s cubic-bezier(.4,0,.2,1);
  transform-style:preserve-3d;
}
.flip-wrap.is-flipped .flip-inner{ transform:rotateY(180deg); }
.flashcard{
  background:var(--card);color:var(--ink);
  border-radius:20px;padding:24px 22px;
  box-shadow:0 18px 36px rgba(0,0,0,0.32);
  min-height:280px;
  display:flex;flex-direction:column;
  position:absolute;top:0;left:0;right:0;
  -webkit-backface-visibility:hidden;
  backface-visibility:hidden;
}
.flashcard.back{
  transform:rotateY(180deg);
  background:linear-gradient(150deg,#ffffff 0%,#f4f5ff 100%);
}
.fc-hint{
  position:absolute;bottom:14px;left:0;right:0;text-align:center;
  font-size:11px;color:#9ca3af;font-weight:600;pointer-events:none;
}
.fc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.fc-cat{font-size:11px;font-weight:800;padding:4px 11px;border-radius:99px;background:var(--soft);color:var(--accent2);}
.fc-pos{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;background:#fef3c7;color:#92400e;}
.fc-jp{font-size:36px;font-weight:800;line-height:1.2;margin-bottom:6px;color:#111;}
.fc-kana{font-size:15px;color:var(--muted);margin-bottom:14px;}
.fc-mean{font-size:22px;font-weight:800;color:var(--accent2);margin-bottom:14px;}

/* 앞면 정중앙 큰 단어 표시용 */
.flashcard.front-centered{
  align-items:center;justify-content:center;text-align:center;
  padding:36px 22px;position:relative;
}
.flashcard.front-centered .fc-top-mini{
  position:absolute;top:14px;left:14px;right:14px;
  display:flex;justify-content:space-between;align-items:center;
}
.flashcard.front-centered .fc-word{
  font-size:52px;font-weight:800;line-height:1.15;color:#111;
  word-break:keep-all;letter-spacing:-0.5px;
}
.flashcard.front-centered .fc-word.long{font-size:40px;}
.flashcard.front-centered .fc-word.longer{font-size:32px;}
.flashcard.front-centered ruby.furi rt{font-size:0.32em;}
.fc-ex{background:#f5f6ff;border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.fc-ex .jp{font-size:15px;color:#222;margin-bottom:4px;}
.fc-ex .ko{font-size:12px;color:var(--muted);}
.fc-syn{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.fc-syn .badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700;}
.fc-syn .syn{background:#dcfce7;color:#166534;}
.fc-syn .ant{background:#fee2e2;color:#991b1b;}

/* 요미가나 후리가나 (ruby) */
ruby.furi rt{
  font-size:0.5em;color:#7a5cff;font-weight:600;letter-spacing:0;
  visibility:hidden;
}
body.show-furi ruby.furi rt{visibility:visible;}
.toggle-furi{
  font-size:11px;padding:5px 12px;border-radius:99px;background:#ede9fe;color:#5b21b6;
  font-weight:700;cursor:pointer;border:none;margin-bottom:10px;align-self:flex-start;
}
.toggle-furi.on{background:#7a5cff;color:#fff;}

/* 컨트롤 */
.fc-ctrl{display:flex;gap:8px;margin-bottom:12px;}
.btn{
  flex:1;padding:13px;border-radius:13px;font-size:14px;font-weight:800;
  border:none;cursor:pointer;
}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-ok{background:var(--ok);color:#fff;}
.btn-ng{background:var(--ng);color:#fff;}
.btn-soft{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.16);}
.btn:active{transform:scale(0.96);}
.btn-row{display:flex;gap:8px;margin-bottom:10px;}

/* === 문법 카드 (3D Flip) === */
.gcard{
  background:var(--card);color:var(--ink);
  border-radius:18px;padding:20px;
  box-shadow:0 14px 30px rgba(0,0,0,0.28);
  min-height:230px;
  position:absolute;top:0;left:0;right:0;
  -webkit-backface-visibility:hidden;
  backface-visibility:hidden;
}
.gcard.back{
  transform:rotateY(180deg);
  background:linear-gradient(150deg,#ffffff 0%,#f4f5ff 100%);
}
.gcard .jp{font-size:28px;font-weight:800;color:#111;margin-bottom:6px;}
.gcard.front-centered{align-items:center;justify-content:center;text-align:center;padding:34px 20px;}
.gcard.front-centered .g-word{font-size:40px;font-weight:800;line-height:1.2;color:#111;word-break:keep-all;letter-spacing:-0.5px;}
.gcard.front-centered .g-word.long{font-size:32px;}
.gcard.front-centered .g-word.longer{font-size:26px;}
.gcard .mean{font-size:15px;color:var(--accent2);font-weight:700;margin-bottom:10px;}
.gcard .note{font-size:11px;color:var(--muted);background:#f5f6ff;border-radius:8px;padding:8px 10px;margin-bottom:10px;}
.gcard .ex{background:#fffbeb;border-left:3px solid var(--warn);border-radius:8px;padding:10px 12px;}
.gcard .ex .ej{font-size:15px;color:#1f2937;margin-bottom:4px;}
.gcard .ex .ek{font-size:12px;color:var(--muted);}
.gcard .hint{font-size:11px;color:#9ca3af;font-weight:600;text-align:center;margin-top:14px;}

/* === 핵심10 === */
.c10-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.c10-card{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.13);
  border-radius:14px;padding:14px 12px;cursor:pointer;text-align:center;
}
.c10-card:active{transform:scale(0.96);}
.c10-card .ic{font-size:24px;margin-bottom:4px;}
.c10-card .lbl{font-size:12px;font-weight:800;line-height:1.3;}
.c10-card .prog-mini{font-size:9px;opacity:0.65;margin-top:4px;}

.c10-detail{padding-bottom:30px;}
.c10-detail-head{
  background:rgba(255,255,255,0.06);border-radius:14px;padding:16px;
  margin-bottom:12px;border-left:4px solid var(--accent);
}
.c10-detail-head h2{font-size:18px;font-weight:800;margin-bottom:6px;}
.c10-detail-head .ic-big{font-size:32px;margin-bottom:6px;}

.rule-box{
  background:var(--card);color:var(--ink);border-radius:14px;padding:16px;margin-bottom:12px;
}
.rule-box h3{font-size:13px;font-weight:800;color:var(--accent2);margin-bottom:10px;}
.rule-list{font-size:13px;line-height:1.7;color:#1f2937;}
.rule-list li{margin-bottom:6px;padding-left:8px;list-style:none;position:relative;}
.rule-list li::before{content:"▸";color:var(--accent);font-weight:800;position:absolute;left:-8px;}

.ex-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.ex-item{
  background:var(--card);color:var(--ink);border-radius:12px;padding:14px;
  border-left:4px solid var(--accent3);
}
.ex-item .ej{font-size:16px;font-weight:600;color:#111;margin-bottom:4px;}
.ex-item .ek{font-size:12px;color:var(--muted);margin-bottom:6px;}
.ex-item .tip{font-size:11px;color:var(--accent2);background:#ede9fe;border-radius:6px;padding:3px 8px;display:inline-block;font-weight:700;}

/* 퀴즈 */
.quiz-wrap{background:var(--card);color:var(--ink);border-radius:16px;padding:18px;margin-bottom:12px;}
.quiz-prog{font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:700;}
.quiz-q{font-size:16px;font-weight:700;color:#111;line-height:1.5;margin-bottom:14px;}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.choice{
  text-align:left;padding:12px 14px;border-radius:10px;border:1px solid #e5e7eb;
  background:#f9fafb;color:#111;font-size:14px;font-weight:600;cursor:pointer;
}
.choice:hover{background:#f3f4f6;}
.choice.ok{background:#dcfce7;border-color:#22c55e;color:#166534;}
.choice.ng{background:#fee2e2;border-color:#ef4444;color:#991b1b;}
.choice.disabled{pointer-events:none;opacity:0.7;}
.choice .num{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;background:#e5e7eb;color:#4b5563;font-size:11px;font-weight:800;margin-right:8px;}
.choice.ok .num{background:#22c55e;color:#fff;}
.choice.ng .num{background:#ef4444;color:#fff;}
.exp-box{background:#fffbeb;border-left:3px solid var(--warn);border-radius:8px;padding:10px 12px;font-size:12px;color:#78350f;line-height:1.5;display:none;}
.exp-box.show{display:block;}
.exp-box b{color:#b45309;}

/* === 통계 === */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);
  border-radius:14px;padding:14px;
}
.stat-card .lbl{font-size:11px;color:rgba(255,255,255,0.65);margin-bottom:4px;}
.stat-card .val{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;background-clip:text;color:transparent;}

.cat-list{display:flex;flex-direction:column;gap:8px;}
.cat-row{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;padding:12px 14px;
}
.cat-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.cat-row-name{font-size:13px;font-weight:800;}
.cat-row-name .icx{margin-right:6px;}
.cat-row-count{font-size:11px;color:rgba(255,255,255,0.65);}
.cat-row-tip{font-size:11px;color:rgba(255,255,255,0.72);line-height:1.4;margin-top:4px;}
.cat-row-strategy{font-size:11px;color:var(--accent3);line-height:1.4;margin-top:6px;background:rgba(34,211,238,0.08);padding:7px 10px;border-radius:8px;}

/* 결과 화면 */
.result-card{
  background:linear-gradient(135deg,rgba(34,197,94,0.18),rgba(34,211,238,0.18));
  border:1px solid rgba(34,211,238,0.35);border-radius:18px;padding:24px;text-align:center;margin-bottom:14px;
}
.result-card .big{font-size:48px;font-weight:800;margin-bottom:8px;}
.result-card .lbl{font-size:13px;opacity:0.85;}
</style>
</head>
<body>
<div class="app">
  <div class="appbar">
    <div class="brand" id="brand">N3 <span>마스터</span></div>
    <div class="appbar-btns" id="bar-btns">
      <button class="iconbtn" id="btn-reset" title="진도 초기화">↻</button>
    </div>
  </div>

  <!-- 라우팅: 각 view -->
  <div id="view-landing"></div>
  <div id="view-vocab" class="hide"></div>
  <div id="view-grammar" class="hide"></div>
  <div id="view-core10" class="hide"></div>
  <div id="view-core10-detail" class="hide"></div>
  <div id="view-stats" class="hide"></div>
  <div id="view-wrong" class="hide"></div>
</div>

<script>
/* ===== 데이터 ===== */

/* ===== 요미가나(후리가나) 자동 생성 =====
   - 단어의 jp(한자 포함)에 kana가 있으면 ruby로 감싸 후리가나 표시
   - 단순화 방식: 한자 블록 전체에 kana를 ruby로 매핑 (1:1 정확 매핑은 어렵지만 N3 학습용은 충분)
*/
function makeRuby(jp, kana){
  if(!jp || !kana) return jp || '';
  // 한자가 없으면 그대로
  if(!/[\u4e00-\u9faf]/.test(jp)) return escapeHtml(jp);
  // jp의 한자 부분만 ruby 처리. 동시에 가나가 다 같으면 통째.
  // 간단 처리: 한자 블록 전체에 kana 매핑
  // 가나만 있는 부분과 한자 부분을 분리
  const parts = [];
  let buf = '';
  let mode = null; // 'kanji' | 'kana'
  for(const ch of jp){
    const isKanji = /[\u4e00-\u9faf]/.test(ch);
    const m = isKanji ? 'kanji' : 'kana';
    if(mode === null){ mode = m; buf = ch; continue; }
    if(m === mode){ buf += ch; }
    else { parts.push({mode, text: buf}); mode = m; buf = ch; }
  }
  if(buf) parts.push({mode, text: buf});

  // 한자 부분이 1개뿐이면 그 부분에만 kana 매핑
  const kanjiBlocks = parts.filter(p=>p.mode==='kanji');
  if(kanjiBlocks.length === 1){
    // kana 전체에서 가나 부분(parts) 길이 빼고 한자에 매핑
    let kanaForKanji = kana;
    for(const p of parts){
      if(p.mode === 'kana'){
        // 앞/뒤 가나 떼기
        if(kanaForKanji.startsWith(p.text)) kanaForKanji = kanaForKanji.slice(p.text.length);
        else if(kanaForKanji.endsWith(p.text)) kanaForKanji = kanaForKanji.slice(0, -p.text.length);
      }
    }
    return parts.map(p=>{
      if(p.mode==='kanji'){
        return `<ruby class="furi">${escapeHtml(p.text)}<rt>${escapeHtml(kanaForKanji)}</rt></ruby>`;
      }
      return escapeHtml(p.text);
    }).join('');
  }
  // 한자 블록이 여럿이면 전체를 통째 ruby로 (불완전하지만 표시는 됨)
  return `<ruby class="furi">${escapeHtml(jp)}<rt>${escapeHtml(kana)}</rt></ruby>`;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ===== 상태 ===== */
const STORE_KEY = 'n3master.v2';
let state = loadState();
function loadState(){
  try{
    const j = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
    return Object.assign({
      learned: {},  // vocab id -> 1
      grammarLearned: {}, // grammar id -> 1
      coreProgress: {}, // core10 id -> { ex: 0, quizDone: false, score: 0 }
      wrongVocab: {}, // vocab id -> 1  (오답/어려움 수집)
      wrongGrammar: {}, // grammar id -> 1
      wrongQuiz: {}, // "coreId:qIdx" -> 1
      furi: false,
    }, j);
  }catch(e){ return {learned:{}, grammarLearned:{}, coreProgress:{}, wrongVocab:{}, wrongGrammar:{}, wrongQuiz:{}, furi:false}; }
}
function saveState(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

let route = 'landing';
let routeParam = null;

function go(r, param){
  route = r;
  routeParam = param;
  ['landing','vocab','grammar','core10','core10-detail','stats','wrong'].forEach(v=>{
    document.getElementById('view-'+v).classList.add('hide');
  });
  document.getElementById('view-'+r).classList.remove('hide');
  // 헤더 갱신
  document.getElementById('bar-btns').innerHTML = (r==='landing')
    ? `<button class="iconbtn" id="btn-reset" title="진도 초기화">↻</button>`
    : `<button class="backbtn" id="btn-back">← 홈</button>`;
  const back = document.getElementById('btn-back');
  if(back) back.addEventListener('click', ()=>{
    if(r==='core10-detail') go('core10');
    else go('landing');
  });
  const rs = document.getElementById('btn-reset');
  if(rs) rs.addEventListener('click', ()=>{
    if(confirm('학습 진도를 초기화할까요?\n(어휘·문법·핵심10·오답노트 모두 삭제)')){
      state = {learned:{},grammarLearned:{},coreProgress:{},wrongVocab:{},wrongGrammar:{},wrongQuiz:{},furi:state.furi};
      saveState(); render();
    }
  });
  // body furi class
  document.body.classList.toggle('show-furi', !!state.furi);
  render();
}

function openResetMenu(){
  const opt = prompt('초기화 종류를 선택하세요\n1 = 전체 초기화 (학습 진도 + 오답노트 모두)\n2 = 오답노트만 초기화\n3 = 학습 진도만 초기화 (오답노트 유지)\n\n번호 입력 (취소: 빈칸)');
  if(!opt) return;
  if(opt === '1'){
    if(!confirm('전체 학습 진도와 오답노트를 모두 삭제합니다. 계속할까요?')) return;
    state = {learned:{},grammarLearned:{},coreProgress:{},wrongVocab:{},wrongGrammar:{},wrongQuiz:{},furi:state.furi};
  } else if(opt === '2'){
    if(!confirm('오답노트만 삭제합니다. 계속할까요?')) return;
    state.wrongVocab = {}; state.wrongGrammar = {}; state.wrongQuiz = {};
  } else if(opt === '3'){
    if(!confirm('학습 진도만 삭제합니다 (오답노트 유지). 계속할까요?')) return;
    state.learned = {}; state.grammarLearned = {}; state.coreProgress = {};
  } else {
    alert('잘못된 입력입니다.');
    return;
  }
  saveState(); renderLanding();
}

let vocabState = { cat:'all', idx:0, mode:'flash' /* flash | list */, showAnswer:false, queue:[] };
function buildVocabQueue(){
  const list = vocabState.cat === 'all' ? VOCAB.slice() : VOCAB.filter(v=>v.cat===vocabState.cat);
  vocabState.queue = list;
  if(vocabState.idx >= list.length) vocabState.idx = 0;
}

        saveState(); vocabState.showAnswer=false; vocabState.idx=(vocabState.idx+1)%vocabState.queue.length; renderVocab();
      }
      else if(a==='next'){ vocabState.showAnswer=false; vocabState.idx=(vocabState.idx+1)%vocabState.queue.length; renderVocab(); }
      else if(a==='prev'){ vocabState.showAnswer=false; vocabState.idx=(vocabState.idx-1+vocabState.queue.length)%vocabState.queue.length; renderVocab(); }
    });
  });
  // 카드 탭 → 앞↔뒤 플립
  const flipEl = document.getElementById('flip-card-v');
  if(flipEl){
    flipEl.addEventListener('click', ()=>{
      vocabState.showAnswer = !vocabState.showAnswer;
      // 애니메이션 자연스럽게 보이도록 즉시 DOM만 토글
      flipEl.classList.toggle('is-flipped', vocabState.showAnswer);
    });
  }
}
function bindVocabCats(){
  document.querySelectorAll('#vcat-chips .chip').forEach(c=>{
    c.addEventListener('click', ()=>{
      vocabState.cat = c.getAttribute('data-cat');
      vocabState.idx = 0; vocabState.showAnswer = false;
      renderVocab();
    });
  });
}

let c10State = { quizIdx:0, score:0, answered:false, lastChoice:-1 };
function renderCore10Detail(){

  if(!item){ go('core10'); return; }
  const prog = state.coreProgress[item.id] || { quizDone:false, score:0 };
  // 새로 들어오면 quiz state 초기화
  if(c10State._for !== item.id){
    c10State = { _for:item.id, quizIdx:0, score:0, answered:false, lastChoice:-1, finished:false };
  }

  let html = `
    <div class="c10-detail">
      <div class="c10-detail-head" style="border-left-color:${item.color};">
        <div class="ic-big">${item.icon}</div>
        <h2>${escapeHtml(item.label)}</h2>
      </div>

        <h3>📚 활용규칙</h3>

        ${item.examples.map(e=>`
          <div class="ex-item">
            <div class="ej">${makeRuby(e.jp,'')}</div>
            <div class="ek">${escapeHtml(e.ko)}</div>
            ${e.tip?`<div class="tip">💡 ${escapeHtml(e.tip)}</div>`:''}
          </div>
        `).join('')}
      </div>
      <div class="section-title">🎯 문제 풀이 (4지선다 ${item.quiz.length}문제)</div>
      <div id="quiz-area"></div>
    </div>
  `;
  document.getElementById('view-core10-detail').innerHTML = html;
  renderQuiz(item, prog);
}
function renderQuiz(item, prog){
  const area = document.getElementById('quiz-area');
  if(c10State.finished){
    const pct = Math.round(c10State.score / item.quiz.length * 100);
    const passed = pct >= 80;
    area.innerHTML = `
      <div class="result-card">
        <div class="big">${passed?'🎉':'💪'}</div>
        <div style="font-size:28px;font-weight:800;margin-bottom:6px;">${c10State.score} / ${item.quiz.length}</div>
        <div class="lbl">${pct}% — ${passed?'합격! 다음 유형으로':'다시 풀어보기'}</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-soft" id="q-retry">다시 풀기</button>
        <button class="btn btn-primary" id="q-back">목록으로</button>
      </div>
    `;
    document.getElementById('q-retry').addEventListener('click', ()=>{
      c10State = { _for:item.id, quizIdx:0, score:0, answered:false, lastChoice:-1, finished:false };
      renderQuiz(item, prog);
    });
    document.getElementById('q-back').addEventListener('click', ()=>go('core10'));
    return;
  }
  const q = item.quiz[c10State.quizIdx];
  area.innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-prog">문제 ${c10State.quizIdx+1} / ${item.quiz.length} · 현재 점수 ${c10State.score}</div>
      <div class="quiz-q">${escapeHtml(q.q)}</div>
      <div class="choices">
        ${q.choices.map((ch,i)=>{
          let cls = 'choice';
          if(c10State.answered){
            if(i === q.answer) cls += ' ok';
            else if(i === c10State.lastChoice) cls += ' ng';
            cls += ' disabled';
          }
          return `<button class="${cls}" data-i="${i}"><span class="num">${i+1}</span>${escapeHtml(ch)}</button>`;
        }).join('')}
      </div>
      <div class="exp-box ${c10State.answered?'show':''}"><b>해설:</b> ${escapeHtml(q.exp||'')}</div>
      ${c10State.answered ? `<button class="btn btn-primary" id="q-next" style="margin-top:10px;">${c10State.quizIdx+1<item.quiz.length?'다음 문제 →':'결과 보기'}</button>`:''}
    </div>
  `;
  area.querySelectorAll('.choice').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(c10State.answered) return;
      const i = parseInt(btn.getAttribute('data-i'),10);
      c10State.lastChoice = i;
      c10State.answered = true;
      if(i === q.answer){
        c10State.score++;
        // 맞춰으면 오답노트에서 제거
        const wk = item.id+':'+c10State.quizIdx;
        if(state.wrongQuiz && state.wrongQuiz[wk]){
          delete state.wrongQuiz[wk];
          saveState();
        }
      } else {
        // 틀리면 오답노트에 기록
        state.wrongQuiz = state.wrongQuiz || {};
        state.wrongQuiz[item.id+':'+c10State.quizIdx] = 1;
        saveState();
      }
      renderQuiz(item, prog);
    });
  });
  const nx = document.getElementById('q-next');
  if(nx) nx.addEventListener('click', ()=>{
    if(c10State.quizIdx+1 < item.quiz.length){
      c10State.quizIdx++; c10State.answered = false; c10State.lastChoice = -1;
      renderQuiz(item, prog);
    } else {
      c10State.finished = true;
      state.coreProgress[item.id] = { quizDone:true, score:c10State.score };
      saveState();
      renderQuiz(item, prog);
    }
  });
}

let wrongState = { tab:'vocab', vIdx:0, gIdx:0, qIdx:0, showAnswer:false, quizAnswered:false, quizLastChoice:-1 };
function renderWrong(){
  const wrongV = Object.keys(state.wrongVocab||{});
  const wrongG = Object.keys(state.wrongGrammar||{});
  const wrongQ = Object.keys(state.wrongQuiz||{});
  const total = wrongV.length + wrongG.length + wrongQ.length;

  if(total === 0){
    document.getElementById('view-wrong').innerHTML = `
      <div style="text-align:center;padding:40px 20px;">
        <div style="font-size:56px;margin-bottom:14px;">🎉</div>

          어휘·문법에서 <b style="color:#fca5a5">😅 어려움/다시</b>를 누르거나<br>
          핵심10 퀴즈에서 <b style="color:#fca5a5">틀린 문제</b>가 자동으로 여기에 쌓입니다.
        </div>
        <button class="btn btn-primary" style="max-width:200px;margin-top:20px;" onclick="go('landing')">홈으로</button>
      </div>`;
    return;
  }

  const tabs = [
    {key:'vocab', label:'📖 어휘', count:wrongV.length},
    {key:'grammar', label:'📝 문법', count:wrongG.length},
    {key:'quiz', label:'🎯 퀴즈', count:wrongQ.length},
  ];

  const chips = tabs.map(t=>
    `<div class="chip ${wrongState.tab===t.key?'active':''} ${t.count===0?'disabled':''}" data-tab="${t.key}">${t.label}<span class="cnt">${t.count}</span></div>`
  ).join('');

  let body = '';
  if(wrongState.tab === 'vocab' && wrongV.length > 0){
    body = renderWrongVocab(wrongV);
  } else if(wrongState.tab === 'grammar' && wrongG.length > 0){
    body = renderWrongGrammar(wrongG);
  } else if(wrongState.tab === 'quiz' && wrongQ.length > 0){
    body = renderWrongQuiz(wrongQ);
  } else {
    // 현재 탭이 비어있으면 데이터 있는 첫 탭으로
    const first = tabs.find(t=>t.count>0);
    if(first){ wrongState.tab = first.key; return renderWrong(); }
  }

  document.getElementById('view-wrong').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div style="font-size:16px;font-weight:800;">📕 오답노트 <span style="font-size:12px;color:rgba(255,255,255,0.6);font-weight:600;">${total}건</span></div>
      <button class="backbtn" id="btn-wrong-clear" style="padding:6px 10px;font-size:11px;">🗑 이 탭 비우기</button>
    </div>
    <div class="chips">${chips}</div>
    ${body}
  `;

  document.querySelectorAll('#view-wrong .chip[data-tab]').forEach(c=>{
    c.addEventListener('click', ()=>{
      wrongState.tab = c.getAttribute('data-tab');
      wrongState.vIdx=0; wrongState.gIdx=0; wrongState.qIdx=0;
      wrongState.showAnswer=false; wrongState.quizAnswered=false; wrongState.quizLastChoice=-1;
      renderWrong();
    });
  });
  const clr = document.getElementById('btn-wrong-clear');
  if(clr) clr.addEventListener('click', ()=>{
    const t = wrongState.tab;
    if(!confirm(`현재 탭(${t}) 오답을 모두 비울까요?`)) return;
    if(t==='vocab') state.wrongVocab = {};
    else if(t==='grammar') state.wrongGrammar = {};
    else if(t==='quiz') state.wrongQuiz = {};
    saveState(); renderWrong();
  });

  bindWrongActions();
}

    </div>
    <div class="fc-ctrl">
      <button class="btn btn-ng" data-wact="still-hard">😅 아직 어려움</button>
      <button class="btn btn-ok" data-wact="mastered">✓ 이제 외웠음</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-soft" data-wact="prev">← 이전</button>
      <button class="btn btn-soft" data-wact="next">다음 →</button>
    </div>
  `;
}

function renderWrongQuiz(keys){
  if(wrongState.qIdx >= keys.length) wrongState.qIdx = 0;
  const key = keys[wrongState.qIdx];
  const [coreId, qIdxStr] = key.split(':');
  const item = CORE10.find(c => c.id === coreId);
  const qi = parseInt(qIdxStr, 10);
  const q = item && item.quiz ? item.quiz[qi] : null;
  if(!q){ return `<div class="landing-tip">문제를 찾을 수 없어요.</div>`; }

  return `
    <div class="progress"><div class="progress-fill" style="width:${(wrongState.qIdx+1)/keys.length*100}%"></div></div>
    <div class="stats"><span><b>${wrongState.qIdx+1}</b>/${keys.length}</span><span class="ng">오답 ${keys.length}개</span></div>
    <div class="quiz-wrap">
      <div class="quiz-prog">${item.icon} ${escapeHtml(item.label)}</div>
      <div class="quiz-q">${escapeHtml(q.q)}</div>
      <div class="choices">
        ${q.choices.map((ch,i)=>{
          let cls = 'choice';
          if(wrongState.quizAnswered){
            if(i === q.answer) cls += ' ok';
            else if(i === wrongState.quizLastChoice) cls += ' ng';
            cls += ' disabled';
          }
          return `<button class="${cls}" data-i="${i}"><span class="num">${i+1}</span>${escapeHtml(ch)}</button>`;
        }).join('')}
      </div>
      <div class="exp-box ${wrongState.quizAnswered?'show':''}"><b>해설:</b> ${escapeHtml(q.exp||'')}</div>
      ${wrongState.quizAnswered ? `<button class="btn btn-primary" data-wact="quiz-next" style="margin-top:10px;">다음 문제 →</button>` : ''}
    </div>
  `;
}

function bindWrongActions(){
  // 카드 플립
  const flip = document.getElementById('flip-card-w');
  if(flip){
    flip.addEventListener('click', ()=>{
      wrongState.showAnswer = !wrongState.showAnswer;
      flip.classList.toggle('is-flipped', wrongState.showAnswer);
    });
  }

  // 어휘/문법 액션
  document.querySelectorAll('#view-wrong [data-wact]').forEach(b=>{
    b.addEventListener('click', ev=>{
      ev.stopPropagation();
      const a = b.getAttribute('data-wact');
      const tab = wrongState.tab;
      const idxKey = tab==='vocab' ? 'vIdx' : (tab==='grammar' ? 'gIdx' : 'qIdx');
      const bag = tab==='vocab' ? state.wrongVocab : (tab==='grammar' ? state.wrongGrammar : state.wrongQuiz);
      const ids = Object.keys(bag||{});

      if(a==='mastered'){
        const key = ids[wrongState[idxKey]];
        // 어휘/문법이면 learned에도 등록
        if(tab==='vocab'){ state.learned[key]=1; }
        else if(tab==='grammar'){ state.grammarLearned[key]=1; }
        delete bag[key];
        saveState();
        wrongState.showAnswer = false;
        // idx는 유지 (다음 아이템 자동 노출)
        renderWrong();
      } else if(a==='still-hard'){
        // 그냥 다음으로
        wrongState.showAnswer = false;
        wrongState[idxKey] = (wrongState[idxKey]+1) % Math.max(ids.length,1);
        renderWrong();
      } else if(a==='next'){
        wrongState.showAnswer = false;
        wrongState[idxKey] = (wrongState[idxKey]+1) % Math.max(ids.length,1);
        renderWrong();
      } else if(a==='prev'){
        wrongState.showAnswer = false;
        wrongState[idxKey] = (wrongState[idxKey]-1+ids.length) % Math.max(ids.length,1);
        renderWrong();
      } else if(a==='quiz-next'){
        wrongState.quizAnswered = false;
        wrongState.quizLastChoice = -1;
        wrongState.qIdx = (wrongState.qIdx+1) % Math.max(Object.keys(state.wrongQuiz||{}).length,1);
        renderWrong();
      }
    });
  });

  // 퀴즈 선택지
  document.querySelectorAll('#view-wrong .choice').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(wrongState.quizAnswered) return;
      const i = parseInt(btn.getAttribute('data-i'),10);
      const keys = Object.keys(state.wrongQuiz||{});
      const key = keys[wrongState.qIdx];
      const [coreId, qIdxStr] = key.split(':');
      const item = CORE10.find(c => c.id === coreId);
      const q = item.quiz[parseInt(qIdxStr,10)];
      wrongState.quizLastChoice = i;
      wrongState.quizAnswered = true;
      if(i === q.answer){
        // 맞추면 오답노트에서 제거
        delete state.wrongQuiz[key];
        saveState();
      }
      renderWrong();
    });
  });
}

/* ===== 라우터 ===== */
function render(){
  if(route==='landing') renderLanding();
  else if(route==='vocab') renderVocab();
  else if(route==='grammar') renderGrammar();
  else if(route==='core10') renderCore10();
  else if(route==='core10-detail') renderCore10Detail();
  else if(route==='stats') renderStats();
  else if(route==='wrong') renderWrong();
}

document.body.classList.toggle('show-furi', !!state.furi);
go('landing');
</script>
</body>
