<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1024">
<title>N3 벼락치기</title>
<style>
:root{
  --bg1:#0f1024; --bg2:#1a1a3e; --bg3:#2d1b4e;
  --card:#ffffff; --ink:#0b1230;
  --accent:#ff5d8f; --accent2:#7a5cff; --accent3:#22d3ee;
  --ok:#22c55e; --ng:#ef4444; --warn:#fbbf24;
  --soft:#e8eaff; --muted:#6b7280;
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-bot:env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Noto Sans KR",sans-serif;
  background:linear-gradient(180deg,var(--bg1),var(--bg2) 50%,var(--bg3));
  background-attachment:fixed;
  color:#fff;
  width:100vw;
  height:100vh;
  height:100dvh;
  overflow:hidden;
  position:fixed;
  top:0;left:0;
  -webkit-user-select:none;
  user-select:none;
  touch-action:manipulation;
}

.app{
  position:absolute;
  inset:0;
  padding:calc(var(--safe-top) + 10px) 12px calc(var(--safe-bot) + 10px);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* 헤더 */
.head{flex-shrink:0;}
.title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.title{font-size:15px;font-weight:800;}
.title span{
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  color:transparent;
}
.head-btns{display:flex;gap:6px;}
.icon-btn{
  width:36px;height:36px;border-radius:10px;
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
  color:#fff;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.icon-btn:active{background:rgba(255,255,255,0.25);transform:scale(0.95);}

/* 메인 탭 */
.tabs{display:flex;gap:6px;margin-bottom:8px;}
.tab{
  flex:1;padding:10px 4px;border-radius:11px;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);
  color:rgba(255,255,255,0.75);font-size:12px;font-weight:700;
  text-align:center;cursor:pointer;
}
.tab.active{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border-color:transparent;
}
.tab small{display:block;font-size:9px;opacity:0.85;margin-top:1px;}

/* 가로 스크롤 칩 */
.scroll-row{
  display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px;
  -webkit-overflow-scrolling:touch;
}
.scroll-row::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;padding:7px 12px;border-radius:999px;font-size:11px;font-weight:700;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);
  color:rgba(255,255,255,0.8);white-space:nowrap;cursor:pointer;
}
.chip.active.mode{background:linear-gradient(135deg,var(--accent3),var(--accent2));color:#fff;border-color:transparent;}
.chip.active.cat{background:linear-gradient(135deg,var(--accent),var(--warn));color:#fff;border-color:transparent;}

/* 진행률 */
.progress{height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin-bottom:5px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));width:0%;transition:width 0.4s;}
.stats{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.65);margin-bottom:10px;}
.stats b{color:#fff;}
.stats .ok{color:#86efac;}
.stats .ng{color:#fca5a5;}

/* 메인 영역 (남은 공간 전부) */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
}

/* 카드 영역 */
.card-area{flex:1;perspective:1200px;margin-bottom:12px;min-height:0;position:relative;}
.card{
  position:absolute;
  inset:0;
  background:var(--card);color:var(--ink);
  border-radius:24px;
  box-shadow:0 16px 40px rgba(0,0,0,0.45);
  transform-style:preserve-3d;
  -webkit-transform-style:preserve-3d;
  transition:transform 0.55s cubic-bezier(0.4,0.0,0.2,1);
  cursor:pointer;
}
.card.flipped{transform:rotateY(180deg);}

.face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  padding:18px 18px 14px;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-radius:24px;
}
.face.back{transform:rotateY(180deg);}

.face-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-shrink:0;}
.badge{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:999px;
}
.badge.mode{background:linear-gradient(135deg,var(--accent3),var(--accent2));}
.card-id{font-size:10px;color:var(--muted);font-weight:600;display:flex;align-items:center;}
.miss-tag{background:#fee2e2;color:#dc2626;font-size:9px;font-weight:700;padding:2px 6px;border-radius:999px;margin-left:5px;}
.pos-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;margin-right:5px;background:#eef2ff;color:#4338ca;}
.pos-tag.v{background:#dbeafe;color:#1e40af;}
.pos-tag.n{background:#fef3c7;color:#92400e;}
.pos-tag.adji{background:#dcfce7;color:#166534;}
.pos-tag.adjn{background:#fae8ff;color:#86198f;}
.pos-tag.adv{background:#ffedd5;color:#9a3412;}
.pos-tag.conj{background:#e0e7ff;color:#3730a3;}
.pos-tag.katakana{background:#fce7f3;color:#9d174d;}

.q-prompt{font-size:11px;color:var(--muted);text-align:center;margin-bottom:6px;font-weight:600;}
.jp-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:8px 4px;}
.jp{
  font-size:44px;font-weight:800;line-height:1.15;text-align:center;
  letter-spacing:-1px;
  background:linear-gradient(135deg,#0b1230,#7a5cff,#22d3ee);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  color:transparent;
  word-break:keep-all;
}
.jp.small{font-size:30px;}
.jp.tiny{font-size:20px;line-height:1.4;}
.kana-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:8px;}
.tap-hint{text-align:center;font-size:11px;color:var(--muted);padding-top:6px;flex-shrink:0;}

.back-jp{font-size:32px;font-weight:800;text-align:center;color:var(--ink);margin:4px 0 2px;}
.back-kana{font-size:14px;color:var(--accent2);text-align:center;font-weight:600;margin-bottom:6px;letter-spacing:1px;}
.meaning{font-size:20px;font-weight:700;text-align:center;color:var(--ink);margin:4px 0 8px;line-height:1.3;}
.meaning.big{font-size:24px;margin:10px 0 8px;}
.note-pill{
  align-self:center;background:var(--soft);color:var(--accent2);
  padding:3px 10px;border-radius:999px;font-size:10px;font-weight:600;margin-bottom:8px;
}
.ex-box{
  background:#f9fafb;border-radius:11px;padding:10px 12px;margin-top:4px;
  border-left:3px solid var(--accent2);
}
.ex-label{font-size:9px;color:var(--muted);font-weight:700;margin-bottom:3px;letter-spacing:1px;}
.ex-jp{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px;line-height:1.4;}
.ex-mean{font-size:11px;color:var(--muted);}
.relations{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.rel-pill{background:#f3f4f6;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;}
.rel-pill.syn{background:#dcfce7;color:#166534;}
.rel-pill.ant{background:#fee2e2;color:#991b1b;}

.flash{position:absolute;inset:0;border-radius:24px;pointer-events:none;opacity:0;z-index:10;}
.flash.ok{background:radial-gradient(circle,rgba(34,197,94,0.55),transparent 70%);}
.flash.ng{background:radial-gradient(circle,rgba(239,68,68,0.5),transparent 70%);}
.flash.show{animation:flash 0.55s ease-out;}
@keyframes flash{0%{opacity:1;}100%{opacity:0;}}

.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex-shrink:0;}
.btn{
  border:none;padding:18px 8px;border-radius:16px;font-size:15px;font-weight:800;
  color:#fff;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  box-shadow:0 6px 18px rgba(0,0,0,0.25);
}
.btn:active{transform:scale(0.96);}
.btn-ng{background:linear-gradient(135deg,#ef4444,#dc2626);}
.btn-ok{background:linear-gradient(135deg,#22c55e,#16a34a);}

/* 완료 화면 */
.done{
  background:rgba(255,255,255,0.05);border-radius:20px;padding:28px 20px;
  text-align:center;border:1px solid rgba(255,255,255,0.1);
  flex:1;display:flex;flex-direction:column;justify-content:center;overflow-y:auto;
}
.done h2{font-size:24px;margin:0 0 6px;color:#fbbf24;}
.done p{color:rgba(255,255,255,0.7);margin:4px 0;font-size:13px;}
.done .big{font-size:60px;margin:6px 0;}
.done-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
.btn-text{
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
  color:#fff;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;
}
.btn-text:active{background:rgba(255,255,255,0.2);}
.miss-section{
  margin-top:14px;background:rgba(255,255,255,0.04);
  border-radius:12px;padding:12px;border:1px solid rgba(251,191,36,0.3);text-align:left;
}
.miss-section h3{margin:0 0 6px;font-size:11px;color:var(--warn);font-weight:700;}
.miss-list{display:flex;flex-wrap:wrap;gap:4px;}
.miss-list span{background:rgba(251,191,36,0.15);color:#fde68a;padding:2px 7px;border-radius:999px;font-size:10px;}

.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:rgba(15,16,36,0.95);border:1px solid rgba(255,255,255,0.15);
  color:#fff;padding:10px 18px;border-radius:999px;font-size:12px;
  opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:99;
}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="app">
  <div class="head">
    <div class="title-row">
      <div class="title">N3 <span>벼락치기</span></div>
      <div class="head-btns">
        <button class="icon-btn" id="btnShuffle" type="button">🔀</button>
        <button class="icon-btn" id="btnReset" type="button">🔄</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="grammar">📚 문법<small>120</small></div>
      <div class="tab" data-tab="vocab">🈂️ 어휘<small>831</small></div>
    </div>

    <div class="scroll-row" id="modeRow" style="display:none;">
      <div class="chip mode active" data-mode="meaning">📖 의미</div>
      <div class="chip mode" data-mode="read">🔤 한자읽기</div>
      <div class="chip mode" data-mode="write">✏️ 표기</div>
      <div class="chip mode" data-mode="ctx">📝 문맥</div>
      <div class="chip mode" data-mode="syn">🔁 유의어</div>
    </div>

    <div class="scroll-row" id="catRow" style="display:none;">
      <div class="chip cat active" data-cat="all">🌍 전체</div>
      <div class="chip cat" data-cat="daily">🏠 일상</div>
      <div class="chip cat" data-cat="work">💼 직장</div>
      <div class="chip cat" data-cat="emotion">😊 감정</div>
      <div class="chip cat" data-cat="travel">🚇 교통</div>
      <div class="chip cat" data-cat="food">🍙 음식</div>
      <div class="chip cat" data-cat="body">💊 건강</div>
      <div class="chip cat" data-cat="social">📱 사회/IT</div>
      <div class="chip cat" data-cat="nature">🌦️ 자연</div>
      <div class="chip cat" data-cat="time">⏰ 시간</div>
      <div class="chip cat" data-cat="adv">🔗 부사</div>
    </div>

    <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    <div class="stats">
      <span>완주 <b id="statDone">0</b>/<b id="statTotal">0</b></span>
      <span><span class="ok">✓<b id="statOk">0</b></span> <span class="ng">✗<b id="statNg">0</b></span></span>
      <span>큐 <b id="statQueue">0</b></span>
    </div>
  </div>

  <div class="main" id="mainArea"></div>
</div>

  function storageSet(k,v){
    if(hasLocalStorage){ try{ localStorage.setItem(k,v); return; }catch(e){} }
    memStore[k] = v;
  }
  function storageGet(k){
    if(hasLocalStorage){ try{ return localStorage.getItem(k); }catch(e){} }
    return memStore[k] || null;
  }
  function storageRemove(k){
    if(hasLocalStorage){ try{ localStorage.removeItem(k); }catch(e){} }
    delete memStore[k];
  }

  var state = {
    tab:'grammar', mode:'meaning', cat:'all',
    queue:[], mastered:[], missCount:{},
    roundOk:0, roundNg:0,
    flipped:false, currentId:null
  };

  function storageKey(){
    if(state.tab==='grammar') return STORAGE_PREFIX+'grammar';
    return STORAGE_PREFIX+'vocab_'+state.mode+'_'+state.cat;
  }

  function shuffleArray(a){
    for(var i=a.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1));
      var t=a[i]; a[i]=a[j]; a[j]=t;
    }
  }

  function getDataset(){
    if(state.tab==='grammar') return GRAMMAR;
    if(state.cat==='all') return VOCAB;
    return VOCAB.filter(function(v){ return v.cat===state.cat; });
  }

  function getCardById(id){
    var ds = state.tab==='grammar' ? GRAMMAR : VOCAB;
    for(var i=0;i<ds.length;i++){ if(ds[i].id===id) return ds[i]; }
    return null;
  }

  function saveState(){
    try{
      storageSet(storageKey(), JSON.stringify({
        queue:state.queue,
        mastered:state.mastered,
        missCount:state.missCount,
        roundOk:state.roundOk,
        roundNg:state.roundNg
      }));
    }catch(e){}
  }

  function loadState(){
    try{
      var raw = storageGet(storageKey());
      if(!raw){ initFresh(); return; }
      var s = JSON.parse(raw);
      state.queue = s.queue || [];
      state.mastered = s.mastered || [];
      state.missCount = s.missCount || {};
      state.roundOk = s.roundOk || 0;
      state.roundNg = s.roundNg || 0;
      var dsLen = getDataset().length;
      if(state.queue.length===0 && state.mastered.length !== dsLen){
        initFresh();
      }
    }catch(e){ initFresh(); }
  }

  function initFresh(){
    var ds = getDataset();
    state.queue = ds.map(function(c){ return c.id; });
    shuffleArray(state.queue);
    state.mastered = [];
    state.missCount = {};
    state.roundOk = 0;
    state.roundNg = 0;
    saveState();
  }

  function isInMastered(id){
    return state.mastered.indexOf(id) !== -1;
  }
  function addMastered(id){
    if(!isInMastered(id)) state.mastered.push(id);
  }

  function buildQuestion(card){
    if(state.tab==='grammar') return { qPrompt:'다음 문법의 뜻은?', jp:card.jp, size:'normal' };
    var m = state.mode;
    if(m==='meaning') return { qPrompt:'다음 단어의 뜻은?', jp:card.jp, size:'normal' };
    if(m==='read') return { qPrompt:'다음 한자의 읽기는?', jp:card.jp, size:'normal' };
    if(m==='write') return { qPrompt:'이 히라가나의 한자 표기는?', jp:card.kana, size:'small' };
    if(m==='ctx'){
      var blank = card.ex.replace(card.jp,'＿＿＿').replace(card.kana,'＿＿＿');
      return { qPrompt:'빈칸에 들어갈 단어는?', jp:blank, size:'tiny', exHint:card.exMean };
    }
    if(m==='syn'){
      var hasSyn = card.syn && card.syn.length;
      var hasAnt = card.ant && card.ant.length;
      return { qPrompt: (!hasSyn && hasAnt) ? '이 단어의 반의어는?' : '이 단어의 유의어는?', jp:card.jp, size:'normal' };
    }
    return { qPrompt:'?', jp:card.jp, size:'normal' };
  }

  function badgeLabel(card){
    if(state.tab==='grammar') return '문법 #'+card.id;
    var m = {meaning:'의미',read:'한자읽기',write:'표기',ctx:'문맥',syn:'유의어'};
    return m[state.mode]+' #'+card.id;
  }

  function esc(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render(){
    var ds = getDataset();
    document.getElementById('statTotal').textContent = ds.length;
    document.getElementById('statDone').textContent = state.mastered.length;
    document.getElementById('statOk').textContent = state.roundOk;
    document.getElementById('statNg').textContent = state.roundNg;
    document.getElementById('statQueue').textContent = state.queue.length;
    document.getElementById('progressFill').style.width = (state.mastered.length/Math.max(ds.length,1)*100)+'%';

    document.getElementById('modeRow').style.display = state.tab==='vocab' ? 'flex' : 'none';
    document.getElementById('catRow').style.display = state.tab==='vocab' ? 'flex' : 'none';

    var main = document.getElementById('mainArea');

    if(ds.length===0){
      main.innerHTML='<div class="done"><p>카테고리 데이터가 없어요</p></div>';
      return;
    }
    if(state.queue.length===0){
      main.innerHTML = renderDone();
      bindDoneEvents();
      return;
    }

    var id = state.queue[0];
    state.currentId = id;
    var card = getCardById(id);
    if(!card){ state.queue.shift(); render(); return; }
    var q = buildQuestion(card);
    state.flipped = false;
    var misses = state.missCount[id]||0;
    var sizeCls = q.size==='small' ? 'small' : (q.size==='tiny' ? 'tiny' : '');
    var badgeMode = (state.tab==='vocab' && state.mode!=='meaning') ? ' mode' : '';
    var missHtml = misses>0 ? '<span class="miss-tag">'+misses+'회</span>' : '';
    var hintHtml = q.exHint ? '<div class="kana-hint">💡 '+esc(q.exHint)+'</div>' : '';

    main.innerHTML =
      '<div class="card-area">' +
        '<div class="card" id="card">' +
          '<div class="face front">' +
            '<div class="face-top">' +
              '<div class="badge'+badgeMode+'">'+badgeLabel(card)+'</div>' +
              '<div class="card-id">남은 '+state.queue.length+' '+missHtml+'</div>' +
            '</div>' +
            '<div class="q-prompt">'+q.qPrompt+'</div>' +
            '<div class="jp-wrap">' +
              '<div class="jp '+sizeCls+'">'+esc(q.jp)+'</div>' +
              hintHtml +
            '</div>' +
            '<div class="tap-hint">👆 카드를 탭해서 정답 보기</div>' +
          '</div>' +
          '<div class="face back">' +
            renderBack(card) +
          '</div>' +
          '<div class="flash ok" id="flashOk"></div>' +
          '<div class="flash ng" id="flashNg"></div>' +
        '</div>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn btn-ng" type="button" id="btnNg">못 외움 ✗</button>' +
        '<button class="btn btn-ok" type="button" id="btnOk">외움 ✓</button>' +
      '</div>';

    // 이벤트 바인딩
    var cardEl = document.getElementById('card');
    var ngBtn = document.getElementById('btnNg');
    var okBtn = document.getElementById('btnOk');

    // 카드 탭으로 뒤집기 (click + touchend 모두 처리)
    var lastTap = 0;
    function handleCardTap(e){
      var now = Date.now();
      if(now - lastTap < 100) return; // 중복 방지
      lastTap = now;
      flipCard();
    }
    cardEl.addEventListener('click', handleCardTap);

    // 버튼 이벤트
    ngBtn.addEventListener('click', function(e){ e.stopPropagation(); markNg(); });
    okBtn.addEventListener('click', function(e){ e.stopPropagation(); markOk(); });
  }

  function renderBack(card){
    if(state.tab==='grammar'){
      return '<div class="face-top">' +
          '<div class="badge">정답</div>' +
          '<div class="card-id">#'+card.id+'</div>' +
        '</div>' +
        '<div class="meaning big">'+esc(card.mean)+'</div>' +
        '<div class="note-pill">'+esc(card.note)+'</div>' +
        '<div class="ex-box" style="margin-top:8px;">' +
          '<div class="ex-label">예문</div>' +
          '<div class="ex-jp">'+esc(card.ex)+'</div>' +
          '<div class="ex-mean">'+esc(card.exMean)+'</div>' +
        '</div>' +
        '<div class="tap-hint" style="margin-top:auto;">아래 버튼으로 채점</div>';
    }
    var synList = (card.syn && card.syn.length) ?
      card.syn.map(function(s){ return '<div class="rel-pill syn">🔁 '+esc(s)+'</div>'; }).join('') : '';
    var antList = (card.ant && card.ant.length) ?
      card.ant.map(function(s){ return '<div class="rel-pill ant">↔️ '+esc(s)+'</div>'; }).join('') : '';
    var rels = (synList||antList) ? '<div class="relations">'+synList+antList+'</div>' : '';
    return '<div class="face-top">' +
        '<div class="badge">정답</div>' +
        '<div class="card-id"><span class="pos-tag '+card.pos+'">'+(POS_LABEL[card.pos]||card.pos)+'</span>#'+card.id+'</div>' +
      '</div>' +
      '<div class="back-jp">'+esc(card.jp)+'</div>' +
      '<div class="back-kana">'+esc(card.kana)+'</div>' +
      '<div class="meaning">'+esc(card.mean)+'</div>' +
      '<div class="ex-box">' +
        '<div class="ex-label">예문</div>' +
        '<div class="ex-jp">'+esc(card.ex)+'</div>' +
        '<div class="ex-mean">'+esc(card.exMean)+'</div>' +
      '</div>' +
      rels +
      '<div class="tap-hint" style="margin-top:auto;">아래 버튼으로 채점</div>';
  }

  function renderDone(){
    var label = state.tab==='grammar' ? '문법' : '어휘';
    return '<div class="done">' +
      '<div class="big">🎉</div>' +
      '<h2>완주!</h2>' +
      '<p>'+label+' 라운드 마스터</p>' +
      '<p style="font-size:11px">맞춤 '+state.roundOk+' · 틀림 '+state.roundNg+'</p>' +
      renderMissReview() +
      '<div class="done-actions">' +
        '<button type="button" class="btn-text" id="btnNewRound">🔄 한 번 더</button>' +
        '<button type="button" class="btn-text" id="btnReviewMiss">📌 틀린 것만</button>' +
      '</div>' +
    '</div>';
  }

  function renderMissReview(){
    var ids = Object.keys(state.missCount).filter(function(id){ return state.missCount[id]>=1; });
    if(ids.length===0) return '<p style="margin-top:12px;color:#86efac">✨ 완벽!</p>';
    var list = ids.sort(function(a,b){ return state.missCount[b]-state.missCount[a]; }).slice(0,20)
      .map(function(id){
        var c = getCardById(parseInt(id,10));
        if(!c) return '';
        var label = state.tab==='grammar' ? c.jp : (c.jp+'('+c.kana+')');
        return '<span>'+esc(label)+'×'+state.missCount[id]+'</span>';
      }).join('');
    return '<div class="miss-section"><h3>⚠️ 자주 틀린 '+ids.length+'개</h3><div class="miss-list">'+list+'</div></div>';
  }

  function bindDoneEvents(){
    var b1 = document.getElementById('btnNewRound');
    var b2 = document.getElementById('btnReviewMiss');
    if(b1) b1.addEventListener('click', function(){ initFresh(); render(); });
    if(b2) b2.addEventListener('click', function(){
      var ids = Object.keys(state.missCount).filter(function(id){ return state.missCount[id]>=1; }).map(function(x){return parseInt(x,10);});
      if(ids.length===0){ showToast('틀린 게 없어!'); initFresh(); render(); return; }
      state.queue = ids;
      shuffleArray(state.queue);
      state.mastered = [];
      state.roundOk = 0; state.roundNg = 0;
      saveState();
      render();
    });
  }

  function flipCard(){
    var card = document.getElementById('card');
    if(!card) return;
    state.flipped = !state.flipped;
    if(state.flipped) card.classList.add('flipped');
    else card.classList.remove('flipped');
  }

  function flash(type){
    var el = document.getElementById(type==='ok'?'flashOk':'flashNg');
    if(!el) return;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
  }

  function vibrate(p){
    try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){}
  }

  function markOk(){
    if(!state.flipped){ flipCard(); showToast('💡 답을 먼저 확인'); return; }
    flash('ok'); vibrate(30);
    addMastered(state.currentId);
    state.queue.shift();
    state.roundOk++;
    saveState();
    setTimeout(render, 260);
  }

  function markNg(){
    if(!state.flipped){ flipCard(); showToast('💡 답을 먼저 확인'); return; }
    flash('ng'); vibrate([20,40,20]);
    state.missCount[state.currentId] = (state.missCount[state.currentId]||0)+1;
    var id = state.queue.shift();
    var insertPos = Math.min(3 + Math.floor(Math.random()*4), state.queue.length);
    state.queue.splice(insertPos, 0, id);
    state.queue.push(id);
    state.roundNg++;
    saveState();
    setTimeout(render, 260);
  }

  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 1600);
  }

  // 이벤트 바인딩 (탭/모드/카테고리)
  function bindClick(selector, handler){
    var els = document.querySelectorAll(selector);
    for(var i=0;i<els.length;i++){
      (function(el){
        el.addEventListener('click', function(){ handler(el); });
      })(els[i]);
    }
  }

  bindClick('.tab', function(el){
    var tabs = document.querySelectorAll('.tab');
    for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
    el.classList.add('active');
    state.tab = el.getAttribute('data-tab');
    loadState();
    if(state.queue.length===0 && state.mastered.length !== getDataset().length) initFresh();
    render();
  });

  bindClick('.mode', function(el){
    var modes = document.querySelectorAll('.mode');
    for(var i=0;i<modes.length;i++) modes[i].classList.remove('active');
    el.classList.add('active');
    state.mode = el.getAttribute('data-mode');
    loadState();
    if(state.queue.length===0 && state.mastered.length !== getDataset().length) initFresh();
    render();
  });

  bindClick('.cat', function(el){
    var cats = document.querySelectorAll('.cat');
    for(var i=0;i<cats.length;i++) cats[i].classList.remove('active');
    el.classList.add('active');
    state.cat = el.getAttribute('data-cat');
    loadState();
    if(state.queue.length===0 && state.mastered.length !== getDataset().length) initFresh();
    render();
  });

  document.getElementById('btnShuffle').addEventListener('click', function(){
    if(state.queue.length<=1){ showToast('큐가 부족해'); return; }
    shuffleArray(state.queue);
    saveState();
    showToast('🔀 셔플 완료');
    render();
  });

  document.getElementById('btnReset').addEventListener('click', function(){
    if(confirm('이 모드의 진행을 초기화할까요?')){
      storageRemove(storageKey());
      initFresh();
      render();
    }
  });

  // iOS Safari 주소창 숨김
  window.addEventListener('load', function(){
    setTimeout(function(){ window.scrollTo(0,1); }, 0);
  });

  // 초기 진입
  loadState();
  render();
})();
</script>
</body>
</html>
